name: iOS UI Tests

on:
  workflow_dispatch:
    inputs:
      simulator:
        description: 'Simulator name'
        required: false
        default: 'iPhone 17 Pro'
        type: string

jobs:
  test:
    name: Run UI Tests
    runs-on: self-hosted
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Show environment
        run: |
          echo "Runner: $(hostname)"
          echo "macOS: $(sw_vers -productVersion)"
          echo "Xcode: $(xcodebuild -version | head -1)"
      
      - name: Boot and configure simulator
        run: |
          SIM_NAME="${{ inputs.simulator }}"
          BUNDLE_ID="com.example.ServiceLocator"
          
          echo "Shutting down any booted simulators..."
          xcrun simctl shutdown all || true
          sleep 2
          
          echo "Finding UDID for $SIM_NAME..."
          SIM_UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          target = '$SIM_NAME'
          for runtime, devices in data['devices'].items():
              for device in devices:
                  if device['name'] == target and device.get('isAvailable', False):
                      print(device['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          
          if [ -z "$SIM_UDID" ]; then
            echo "ERROR: Could not find available simulator named '$SIM_NAME'"
            echo "Available simulators:"
            xcrun simctl list devices available
            exit 1
          fi
          
          echo "Found UDID: $SIM_UDID"
          echo "SIM_UDID=$SIM_UDID" >> $GITHUB_ENV
          
          echo "Booting..."
          xcrun simctl boot "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b
          
          echo "Setting location..."
          xcrun simctl location "$SIM_UDID" set 34.0662,-84.6769
          
          echo "Building app..."
          xcodebuild build-for-testing \
            -project ServiceLocator.xcodeproj \
            -scheme ServiceLocator \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            -derivedDataPath build/DerivedData \
            2>&1 | tee build/build.log
          
          echo "Installing app..."
          APP_PATH=$(find build/DerivedData -name "ServiceLocator.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find ServiceLocator.app after build"
            find build/DerivedData -name "*.app" -type d
            exit 1
          fi
          xcrun simctl install "$SIM_UDID" "$APP_PATH"
          
          echo "Granting location permission..."
          xcrun simctl privacy "$SIM_UDID" grant location "$BUNDLE_ID"
          
          echo "Setup complete."
      
      - name: Run UI tests
        id: tests
        continue-on-error: true
        run: |
          mkdir -p build
          xcodebuild test-without-building \
            -project ServiceLocator.xcodeproj \
            -scheme ServiceLocator \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            -resultBundlePath build/TestResults.xcresult \
            -parallel-testing-enabled NO \
            -derivedDataPath build/DerivedData \
            2>&1 | tee build/xcodebuild.log
      
      - name: Cleanup simulator
        if: always()
        run: |
          xcrun simctl shutdown all || true
          killall -9 Simulator || true
      
      - name: Generate dashboard
        if: always()
        run: |
          python3 scripts/generate-dashboard.py \
            build/TestResults.xcresult \
            build/dashboard
      
      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-dashboard-${{ github.run_number }}
          path: build/dashboard/
          retention-days: 30
      
      - name: Upload raw xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-${{ github.run_number }}
          path: build/TestResults.xcresult
          retention-days: 7
      
      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
