name: iOS UI Tests
 
on:
  workflow_dispatch:
 
jobs:
  test:
    name: Run UI Tests
    runs-on: self-hosted
    timeout-minutes: 30
    
    env:
      SIM_NAME: "iPhone 17 Pro"
      BUNDLE_ID: "com.example.ServiceLocator"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Show environment
        run: |
          echo "Runner: $(hostname)"
          echo "Xcode: $(xcodebuild -version | head -1)"
      
      - name: Open Simulator app (non-headless)
        run: |
          open -a Simulator
          sleep 3
      
      - name: Boot simulator and set location
        run: |
          xcrun simctl shutdown all || true
          sleep 2
          xcrun simctl boot "$SIM_NAME"
          xcrun simctl bootstatus "$SIM_NAME" -b
          xcrun simctl location "$SIM_NAME" set 34.0662,-84.6769
      
      - name: Build app
        run: |
          mkdir -p build
          xcodebuild build-for-testing \
            -project ServiceLocator.xcodeproj \
            -scheme ServiceLocator \
            -destination "platform=iOS Simulator,name=$SIM_NAME" \
            -derivedDataPath build/DerivedData \
            2>&1 | tee build/build.log
      
      - name: Install app and grant location permission
        run: |
          APP_PATH=$(find build/DerivedData -name "ServiceLocator.app" -type d | head -1)
          echo "Installing $APP_PATH"
          xcrun simctl install "$SIM_NAME" "$APP_PATH"
          xcrun simctl privacy "$SIM_NAME" grant location "$BUNDLE_ID"
      
      - name: Run UI tests
        id: tests
        continue-on-error: true
        run: |
          xcodebuild test-without-building \
            -project ServiceLocator.xcodeproj \
            -scheme ServiceLocator \
            -destination "platform=iOS Simulator,name=$SIM_NAME" \
            -resultBundlePath build/TestResults.xcresult \
            -parallel-testing-enabled NO \
            -derivedDataPath build/DerivedData \
            2>&1 | tee build/xcodebuild.log
      
      - name: Generate dashboard
        if: always()
        run: |
          python3 scripts/generate-dashboard.py \
            "$(pwd)/build/TestResults.xcresult" \
            "$(pwd)/build/dashboard"
      
      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-dashboard-${{ github.run_number }}
          path: build/dashboard/
          retention-days: 30
      
      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1