name: iOS UI Tests

on:
  workflow_dispatch:
    inputs:
      simulator:
        description: 'Simulator name'
        required: false
        default: 'iPhone 17 Pro'
        type: string

jobs:
  test:
    name: Run UI Tests
    runs-on: self-hosted
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Show environment
        run: |
          echo "Runner: $(hostname)"
          echo "macOS: $(sw_vers -productVersion)"
          echo "Xcode: $(xcodebuild -version | head -1)"
      
      - name: Boot simulator
        run: |
          SIM_NAME="${{ inputs.simulator }}"
          echo "Shutting down any previously booted simulators..."
          xcrun simctl shutdown all || true
          
          echo "Booting $SIM_NAME..."
          xcrun simctl boot "$SIM_NAME"
          xcrun simctl bootstatus "$SIM_NAME" -b
          
          echo "Currently booted:"
          xcrun simctl list devices booted
      
      - name: Configure simulator
        run: |
          SIM_UDID="${{ steps.sim.outputs.udid }}"
          
          # Set location
          xcrun simctl location "$SIM_UDID" set 34.0662,-84.6769
          
          # Build and install the app first so permissions can be granted
          xcodebuild build-for-testing \
            -project ServiceLocator.xcodeproj \
            -scheme ServiceLocator \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            -derivedDataPath build/DerivedData \
            2>&1 | tee build/build.log
          
          # Find the built app and install it
          APP_PATH=$(find build/DerivedData -name "ServiceLocator.app" -type d | head -1)
          echo "Installing $APP_PATH..."
          xcrun simctl install "$SIM_UDID" "$APP_PATH"
          
          # Now grant permission
          xcrun simctl privacy "$SIM_UDID" grant location com.example.ServiceLocator
      
      - name: Run UI tests
        id: tests
        continue-on-error: true
        run: |
          xcodebuild test-without-building \
            -project ServiceLocator.xcodeproj \
            -scheme ServiceLocator \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath build/TestResults.xcresult \
            -parallel-testing-enabled NO \
            -derivedDataPath build/DerivedData \
            2>&1 | tee build/xcodebuild.log
      
      - name: Cleanup simulator
        if: always()
        run: |
          xcrun simctl shutdown all || true
          killall -9 Simulator || true
      
      - name: Generate dashboard
        if: always()
        run: |
          python3 scripts/generate-dashboard.py \
            build/TestResults.xcresult \
            build/dashboard
      
      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-dashboard-${{ github.run_number }}
          path: build/dashboard/
          retention-days: 30
      
      - name: Upload raw xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-${{ github.run_number }}
          path: build/TestResults.xcresult
          retention-days: 7
      
      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
